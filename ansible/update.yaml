- name: update webserver
  hosts: all
  tasks:
    - name: change web page
      copy:
       src: index.html
       dest: /var/www/html/index.html
    
    - name: add oneline
      lineinfile:
        path: /var/www/html/index.html
        regexp: '^</h1>'
        line: '<h1> hello there this cloud </h1>'
    
    - name: add block of lines
      blockinfile:
        path: /var/www/html/index.html
        marker: "<!-- {mark} ANSIBLE MANAGED BLOCK -->"
        block: |
          <h1> hello my name is suraj </h1>
          <h2> this line 2 </h2>
          <h3> this is block of lines </h3>
          This is the latest (stable) Ansible community documentation. For Red Hat Ansible Automation Platform subscriptions, see Life Cycle for version details


    - name: start service
      systemd:
        name: apache2
        state: restarted
        enabled: true